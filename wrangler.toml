name = "preferans"
compatibility_date = "2024-11-01"
pages_build_output_dir = ".svelte-kit/cloudflare"

# All bindings for this Pages project must be configured via the Cloudflare dashboard:
# https://dash.cloudflare.com/ → Pages → preferans → Settings → Bindings
#
# Required bindings (add via dashboard):
# 1. D1 Database:
#    Name: DB
#    Database: preferans-db
#
# 2. Durable Objects:
#    Name: GAME_ROOM
#    Service: preferans (the Worker)
#    Class: GameRoom
#
# Once configured, both bindings will be available to SvelteKit server routes
# and Pages Functions via platform.env.DB and platform.env.GAME_ROOM
