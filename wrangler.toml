name = "preferans"
compatibility_date = "2024-11-01"
pages_build_output_dir = ".svelte-kit/cloudflare"

[[d1_databases]]
binding = "preferans_db"
database_name = "preferans-db"
database_id = "f0459e96-4a30-451a-a093-8b373ae0adf3"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"
script_name = "preferans"

[vars]
GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID"
# GOOGLE_CLIENT_SECRET is set via wrangler secret put GOOGLE_CLIENT_SECRET
# SESSION_SECRET is set via wrangler secret put SESSION_SECRET

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]
