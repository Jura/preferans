name = "preferans"
compatibility_date = "2024-11-01"
pages_build_output_dir = ".svelte-kit/cloudflare"

[[d1_databases]]
binding = "DB"
database_name = "preferans-db"
database_id = "YOUR_D1_DATABASE_ID"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"
script_name = "preferans-worker"

[vars]
GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID"
# GOOGLE_CLIENT_SECRET is set via wrangler secret put GOOGLE_CLIENT_SECRET
# SESSION_SECRET is set via wrangler secret put SESSION_SECRET

[[migrations]]
tag = "v1"
new_classes = ["GameRoom"]
