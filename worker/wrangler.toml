name = "preferans-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "preferans_db"
database_name = "preferans-db"
database_id = "f0459e96-4a30-451a-a093-8b373ae0adf3"

[durable_objects]
bindings = [
  { name = "GAME_ROOM", class_name = "GameRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[vars]
# Set secrets via: wrangler secret put GOOGLE_CLIENT_SECRET
# Set secrets via: wrangler secret put SESSION_SECRET
ENVIRONMENT = "development"
